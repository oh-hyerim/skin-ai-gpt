<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제품 입력</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>현재 사용하고 있는 제품 입력</h2>
      <form action="result.html" method="get">
      <p class="description">(이미지를 업로드하거나, 나중에 업로드해도 괜찮아요)</p>

      <div class="product-container"></div>

      <div class="image-box" id="image-box">
        <label class="upload-box">
          + 이미지 업로드
          <input type="file" accept="image/*" multiple id="image-input" />
        </label>
      </div>

      <div class="button-box">
        <button class="gray-button">이미지 나중에 올리기</button>
        <button class="blue-button">진단 결과 확인</button>
      </div>
     </form>
    </div>

    <script src="product-input.js"></script>
    <script src="carry_form_data.js"></script>
  </body>
</html>
